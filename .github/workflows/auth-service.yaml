name: Auth Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - "apps/auth-service/**"
      - ".github/workflows/auth-service.yaml"
  pull_request:
    branches: [main]
    paths:
      - "apps/auth-service/**"

jobs:
  test:
    name: Test Auth Service
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: praneeth
          POSTGRES_PASSWORD: praneeth123
          POSTGRES_DB: portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        working-directory: apps/auth-service
        run: npm install

      - name: Run tests
        working-directory: apps/auth-service
        env:
          AUTH_SERVICE_PORT: 3001
          JWT_SECRET: test-secret-key
          JWT_EXPIRES_IN: 7d
          POSTGRES_URL: postgresql://praneeth:praneeth123@localhost:5432/portfolio_test
        run: npm test || echo "No tests yet — skipping"

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/auth-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/portfolio-auth:latest
